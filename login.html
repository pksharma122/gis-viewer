<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIS Viewer — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:linear-gradient(135deg,#1b5e20 0%,#2e7d32 40%,#0d3b6e 100%);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}
    #loader{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1b5e20 0%,#2e7d32 40%,#0d3b6e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
    #loader .ring{width:48px;height:48px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
    #loader p{color:white;margin-top:16px;font-size:15px;font-weight:600;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .card{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.35);width:420px;padding:40px 36px;display:none;}
    .logo{text-align:center;margin-bottom:28px;}
    .logo h1{font-size:28px;color:#1b5e20;font-weight:800;}
    .logo p{color:#666;font-size:13px;margin-top:4px;}
    .tabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid #ddd;margin-bottom:24px;}
    .tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-weight:600;font-size:14px;background:#f5f5f5;color:#777;}
    .tab.active{background:#1b5e20;color:white;}
    .fg{margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
    input[type=text],input[type=email],input[type=password]{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;}
    input:focus{border-color:#2e7d32;}
    .btn{width:100%;padding:13px;background:#2e7d32;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
    .btn:hover{background:#1b5e20;}
    .btn:disabled{background:#aaa;cursor:not-allowed;}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:14px;display:none;}
    .msg.error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;}
    .msg.success{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;}
    .forgot{text-align:right;margin-top:-10px;margin-bottom:14px;}
    .forgot a{font-size:12px;color:#2e7d32;text-decoration:none;}
    .feats{background:#f1f8e9;border-radius:10px;padding:16px;margin-top:20px;}
    .feats h4{color:#33691e;font-size:13px;margin-bottom:10px;}
    .fr{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:6px;}
    .spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
  </style>
</head>
<body>

<div id="loader"><div class="ring"></div><p>GIS Viewer</p></div>

<div class="card" id="card">
  <div class="logo"><h1>🌍 GIS Viewer</h1><p>Professional Geospatial Analysis Platform</p></div>
  <div class="tabs">
    <div class="tab active" id="tL" onclick="sw('login')">Login</div>
    <div class="tab" id="tS" onclick="sw('signup')">Create Account</div>
  </div>
  <div id="fL">
    <div class="fg"><label>Email</label><input type="email" id="lE" placeholder="you@example.com"/></div>
    <div class="fg"><label>Password</label><input type="password" id="lP" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="forgot"><a href="#" onclick="doForgot();return false;">Forgot password?</a></div>
    <button class="btn" id="bL" onclick="doLogin()">Login to GIS Viewer</button>
    <div class="msg" id="mL"></div>
  </div>
  <div id="fS" style="display:none;">
    <div class="fg"><label>Full Name</label><input type="text" id="sN" placeholder="Your Name"/></div>
    <div class="fg"><label>Email</label><input type="email" id="sE" placeholder="you@example.com"/></div>
    <div class="fg"><label>Password (min 6 chars)</label><input type="password" id="sP" placeholder="••••••••"/></div>
    <button class="btn" id="bS" onclick="doSignup()">Create Account &amp; Start Free Trial</button>
    <div class="msg" id="mS"></div>
  </div>
  <div class="feats">
    <h4>✨ Your 7-Day Free Trial Includes:</h4>
    <div class="fr"><span>✂️</span> Spatial Intersect Analysis</div>
    <div class="fr"><span>🛡️</span> Buffer Zone Generation</div>
    <div class="fr"><span>🎨</span> Advanced Symbology</div>
    <div class="fr"><span>📥</span> Export KML, CSV, GeoJSON</div>
    <div class="fr"><span>🗺️</span> Load Shapefile, GeoJSON, KML</div>
  </div>
</div>

<!-- ✅ FIREBASE FIRST — before any app code -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- ✅ APP CODE — after Firebase is loaded -->
<script>
var _cfg = {
  apiKey:"AIzaSyAnZVNM5Mov6fRJ_yVhQE42X58xw_RPEUs",
  authDomain:"gis-viewer-app.firebaseapp.com",
  projectId:"gis-viewer-app",
  storageBucket:"gis-viewer-app.firebasestorage.app",
  messagingSenderId:"696344287586",
  appId:"1:696344287586:web:97ac3942fd3d054d78743b"
};
firebase.initializeApp(_cfg);
var auth = firebase.auth();
var db   = firebase.firestore();

// ── One-time auth check ──
var _done = false;
var _t = setTimeout(function(){
  if(!_done){ showCard(); } // fallback if auth hangs
}, 5000);

var _u = auth.onAuthStateChanged(function(user){
  _done = true;
  clearTimeout(_t);
  _u();
  if(user){ window.location.replace('index.html'); }
  else     { showCard(); }
});

function showCard(){
  document.getElementById('loader').style.display = 'none';
  document.getElementById('card').style.display   = 'block';
}

function msg(id,type,text){ var e=document.getElementById(id); e.className='msg '+type; e.innerHTML=text; e.style.display='block'; }
function setBtn(id,on,label){ var b=document.getElementById(id); b.disabled=!on; b.innerHTML=on?label:'<span class="spin"></span>Please wait...'; }

function doLogin(){
  var e=document.getElementById('lE').value.trim(), p=document.getElementById('lP').value;
  if(!e||!p) return msg('mL','error','Enter email and password.');
  setBtn('bL',false,'');
  auth.signInWithEmailAndPassword(e,p)
    .then(function(){ msg('mL','success','✅ Login successful! Loading...'); setTimeout(function(){ window.location.replace('index.html'); },800); })
    .catch(function(err){
      var m={'auth/user-not-found':'No account with this email.','auth/wrong-password':'Incorrect password.','auth/invalid-credential':'Incorrect email or password.','auth/invalid-email':'Invalid email address.','auth/too-many-requests':'Too many attempts. Please wait.'};
      msg('mL','error',m[err.code]||err.message);
      setBtn('bL',true,'Login to GIS Viewer');
    });
}

function doSignup(){
  var n=document.getElementById('sN').value.trim(), e=document.getElementById('sE').value.trim(), p=document.getElementById('sP').value;
  if(!n) return msg('mS','error','Enter your name.');
  if(!e) return msg('mS','error','Enter your email.');
  if(p.length<6) return msg('mS','error','Password must be at least 6 characters.');
  setBtn('bS',false,'');
  auth.createUserWithEmailAndPassword(e,p)
    .then(function(c){
      return c.user.updateProfile({displayName:n}).then(function(){
        var now=Date.now();
        return db.collection('users').doc(c.user.uid).set({
          uid:c.user.uid,email:e,name:n,plan:'trial',
          trialStart:now,trialEnd:now+7*86400000,
          licenseKey:null,licenseExpiry:null,blocked:false,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    })
    .then(function(){ msg('mS','success','✅ Account created! Loading...'); setTimeout(function(){ window.location.replace('index.html'); },1000); })
    .catch(function(err){
      var m={'auth/email-already-in-use':'Email already registered. Please login.','auth/invalid-email':'Invalid email.','auth/weak-password':'Password too weak.'};
      msg('mS','error',m[err.code]||err.message);
      setBtn('bS',true,'Create Account & Start Free Trial');
    });
}

function doForgot(){
  var e=document.getElementById('lE').value.trim();
  if(!e) return msg('mL','error','Enter your email first.');
  auth.sendPasswordResetEmail(e)
    .then(function(){ msg('mL','success','📧 Reset email sent!'); })
    .catch(function(){ msg('mL','error','Could not send reset email.'); });
}

function sw(t){
  document.getElementById('fL').style.display  = t==='login'  ? 'block':'none';
  document.getElementById('fS').style.display  = t==='signup' ? 'block':'none';
  document.getElementById('tL').className = 'tab'+(t==='login'  ? ' active':'');
  document.getElementById('tS').className = 'tab'+(t==='signup' ? ' active':'');
}
</script>
</body>
</html>
